name: Deploy to Production (main → production gate)

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://goodfoggia.it/
    steps:
      - uses: actions/checkout@v4

      - name: Stage production artifacts
        run: |
          rm -rf deploy && mkdir deploy
          cp index.html deploy/
          cp styles.css deploy/

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.ARUBA_FTP_SERVER }}
          username: ${{ secrets.ARUBA_FTP_USERNAME }}
          password: ${{ secrets.ARUBA_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./deploy/
          server-dir: ${{ secrets.ARUBA_SERVER_DIR_PROD }}   # es. /www/
