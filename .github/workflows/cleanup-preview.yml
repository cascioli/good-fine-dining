name: Cleanup preview (PR closed)

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Create empty dir
        run: mkdir empty

      - name: Wipe preview folder
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.ARUBA_FTP_SERVER }}
          username: ${{ secrets.ARUBA_FTP_USERNAME }}
          password: ${{ secrets.ARUBA_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./empty/
          server-dir: ${{ secrets.ARUBA_SERVER_DIR_PREV }}pr-${{ github.event.pull_request.number }}/
          dangerous-clean-slate: true
